name: Sync packs from S3

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit and push updated pack DBs to main"
        type: boolean
        default: true
  schedule:
    # Monday 07:00 UTC — disable the schedule block if you only want manual runs
    - cron: "0 7 * * 1"

permissions:
  contents: write

# Opt in to Node 24 for JS actions (checkout, setup-python, aws-credentials) until they default to it.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Read AWS region from sync config
        id: cfg
        run: echo "region=$(jq -r .region sync-packs.json)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.cfg.outputs.region }}

      - name: Sync pack DBs from S3
        run: python scripts/sync_packs.py sync --config sync-packs.json

      - name: Whether to commit
        id: should_commit
        run: |
          case "${{ github.event_name }}" in
            schedule)
              echo "do=true" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              case "${{ inputs.commit }}" in
                false|False) echo "do=false" >> "$GITHUB_OUTPUT" ;;
                *) echo "do=true" >> "$GITHUB_OUTPUT" ;;
              esac
              ;;
            *)
              echo "do=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Commit and push
        if: success() && steps.should_commit.outputs.do == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packs/*.db
          if git diff --staged --quiet; then
            echo "No pack changes."
            exit 0
          fi

          # When packs change, automatically bump module.json patch version and tag it.
          # This ensures the new s3-playlists.zip is picked up by Foundry via releases/latest.
          OLD_VER="$(jq -r .version module.json)"
          if [ -z "$OLD_VER" ] || ! echo "$OLD_VER" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "error: module.json version must be semver (X.Y.Z). Got: $OLD_VER"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VER"

          # Avoid tag collisions (rare, but possible if runs overlap).
          for _ in 1 2 3 4 5; do
            NEW_PATCH=$((PATCH+1))
            NEW_VER="${MAJOR}.${MINOR}.${NEW_PATCH}"
            TAG_REF="refs/tags/${NEW_VER}"
            if git ls-remote --tags origin "$TAG_REF" | grep -q "$TAG_REF"; then
              PATCH=$NEW_PATCH
              continue
            fi
            # Update module.json version to the new tag version.
            tmp="$(mktemp)"
            jq --arg v "$NEW_VER" '.version = $v' module.json > "$tmp" && mv "$tmp" module.json

            git add module.json
            git commit -m "Sync pack DBs from S3 ($NEW_VER)"
            git tag -a "$NEW_VER" -m "Release $NEW_VER"
            git push
            git push origin "$NEW_VER"
            exit 0
          done

          echo "error: could not find a non-colliding release tag after several attempts"
          exit 1
