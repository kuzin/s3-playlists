name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Match tag to module.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER=$(jq -r .version module.json)
          if [ "$TAG" != "$VER" ]; then
            echo "Git tag ($TAG) must equal module.json version ($VER)."
            exit 1
          fi

      - name: Build Foundry install zip (flat root: module.json + packs/)
        run: zip -r s3-playlists.zip module.json packs

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: s3-playlists.zip
          generate_release_notes: true
